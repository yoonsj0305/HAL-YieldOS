name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m pip install pytest

      - name: Run pytest
        run: |
          python -m pytest -q

      - name: Run doctor
        run: |
          yieldos doctor --deep

      - name: Run launch guard
        run: |
          python scripts/check_launch_guard.py
