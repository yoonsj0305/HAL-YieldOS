name: public-demo

on:
  workflow_dispatch:

jobs:
  public-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run public demo
        run: |
          python scripts/run_public_demo.py

      - name: Verify output index
        run: |
          test -f output/public_demo/INDEX.md

      - name: Verify no recovery profile was generated
        run: |
          ! find output/public_demo -name "recovery_profile.json" -print -quit | grep .
